# Railway/Nixpacks build config.
# - tesseract: OCR binary for the Telebirr-screenshot reader (pytesseract shells out).
# - nodejs: runs the bundled JS PDF renderer (app/fayda/js_render/render.bundle.js) so
#   the ID PDF is byte-for-byte the faydapdf-railway output. The bundle is self-contained
#   (esbuild), so only the Node runtime is needed — no `npm install`.
# nixPkgs is the reliable way on Nixpacks; aptPkgs is kept as a fallback. "..." keeps
# Nixpacks' defaults.
[phases.setup]
nixPkgs = ["...", "tesseract", "nodejs"]
aptPkgs = ["...", "tesseract-ocr"]
