# Railway/Nixpacks build config.
# Installs the tesseract OCR binary so the Telebirr-screenshot reader works
# (pytesseract shells out to `tesseract`). Nix's `tesseract` package bundles the
# English language data. nixPkgs is the reliable way on Nixpacks; aptPkgs is kept
# as a fallback. "..." keeps Nixpacks' defaults.
[phases.setup]
nixPkgs = ["...", "tesseract"]
aptPkgs = ["...", "tesseract-ocr"]
